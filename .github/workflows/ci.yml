name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend tests (if configured)
        run: |
          if find backend -type f \( -name 'test_*.py' -o -name '*_test.py' \) | grep -q .; then
            python -m unittest discover -s backend -p 'test*.py'
          else
            echo 'Backend tests are not configured.'
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Run frontend tests (if configured)
        run: |
          if node -e "const p=require('./frontend/package.json'); process.exit((p.scripts && p.scripts.test) ? 0 : 1)"; then
            npm run test --prefix frontend
          else
            echo 'Frontend tests are not configured.'
          fi
