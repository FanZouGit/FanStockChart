name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          else
            echo 'backend/requirements.txt not found; skipping backend dependency installation.'
          fi

      - name: Run backend tests (if configured)
        run: |
          if find backend -type f -name 'test*.py' | grep -q .; then
            python -m unittest discover -s backend -p 'test*.py'
          else
            echo 'Backend tests are not configured.'
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          if [ -f frontend/package.json ]; then
            if [ -f frontend/package-lock.json ]; then
              npm ci --prefix frontend
            else
              npm install --prefix frontend
            fi
          else
            echo 'frontend/package.json not found; skipping frontend dependency installation.'
          fi

      - name: Build frontend (if configured)
        run: |
          if [ -f frontend/package.json ] && [ "$(npm pkg get scripts.build --prefix frontend)" != '{}' ]; then
            npm run build --prefix frontend
          else
            echo 'Frontend build is not configured.'
          fi

      - name: Run frontend tests (if configured)
        run: |
          if [ -f frontend/package.json ] && [ "$(npm pkg get scripts.test --prefix frontend)" != '{}' ]; then
            npm run test --prefix frontend
          else
            echo 'Frontend tests are not configured.'
          fi
